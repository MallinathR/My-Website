<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Login — GameVerse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
  /* Login Box ko Premium Gaming Look dene ke liye */
  .login-box {
    background: rgba(15, 15, 18, 0.85) !important; /* Dark Glass effect */
    backdrop-filter: blur(25px); /* Background blur */
    border: 1px solid rgba(0, 212, 255, 0.3); /* Neon Blue border */
    box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
    color: white;
    padding: 40px;
    border-radius: 24px;
    text-align: center;
  }

  /* Input fields ko stylish banane ke liye */
  .login-box input {
    background: rgba(255, 255, 255, 0.05) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    color: white !important;
    border-radius: 12px !important;
    padding: 15px !important;
    font-size: 1rem;
    transition: all 0.3s ease;
  }

  /* Input focus hone par glow effect */
  .login-box input:focus {
    border-color: #00d4ff !important;
    background: rgba(255, 255, 255, 0.1) !important;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    outline: none;
  }

  /* Submit button styling */
  #submit-btn {
    width: 100%;
    margin-top: 20px;
    background: linear-gradient(90deg, #0071e3, #00d4ff);
    border: none;
    font-weight: 600;
    letter-spacing: 1px;
    transition: transform 0.2s ease;
  }

  #submit-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
  }

  #toggle-link {
    color: #00d4ff !important;
    font-size: 0.9rem;
    margin-top: 25px;
  }
</style>
</head>

<body class="page-transition">
  <header class="navbar">
  <div class="logo">GameVerse</div>

  <nav>
    <script src="js/theme-toggle.js"></script>
    <script src="js/user.js"></script>
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="demo.html">Demo</a>
    <a href="support.html">Support</a>
  </nav>

  <div id="user-section"></div>

  <button id="themeToggle" class="theme-toggle">🌙</button>
</header>

  <button id="themeToggle" class="theme-toggle">🌙</button>
</header>

  <section class="login-box">
  <h2 id="form-title">Login to GameVerse</h2>

  <div style="position:relative; width:100%; max-width:320px; margin:10px auto;">
    <input type="text" id="username" placeholder="Username" required style="padding:12px; width:100%; border-radius:8px; border:1px solid #ccc;">
  </div>

  <div style="position:relative; width:100%; max-width:320px; margin:10px auto;">
    <input type="password" id="password" placeholder="Password" required style="padding:12px; width:100%; border-radius:8px; border:1px solid #ccc;">
    <span id="eye-icon" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:1.2rem; color:#666;">
      👁️
    </span>
  </div>

  <div id="error-msg" style="color:red; margin:10px 0; min-height:20px; text-align:center;"></div>

  <button id="submit-btn" style="padding:12px 40px; background:#0071e3; color:white; border:none; border-radius:8px; cursor:pointer; font-size:16px;">Login</button>

  <p id="toggle-link" style="margin-top:20px; color:#0071e3; cursor:pointer; text-align:center;">
    Don't have an account? Register
  </p>
</section>

<script>
  let isLoginMode = true;

  const titleEl = document.getElementById('form-title');
  const btn = document.getElementById('submit-btn');
  const toggleLink = document.getElementById('toggle-link');
  const errorEl = document.getElementById('error-msg');

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.color = 'red';
  }

  function clearError() {
    errorEl.textContent = '';
  }

  toggleLink.addEventListener('click', () => {
    isLoginMode = !isLoginMode;
    if (isLoginMode) {
      titleEl.textContent = 'Login to GameVerse';
      btn.textContent = 'Login';
      toggleLink.textContent = "Don't have an account? Register";
    } else {
      titleEl.textContent = 'Register for GameVerse';
      btn.textContent = 'Register';
      toggleLink.textContent = 'Already have an account? Login';
    }
    clearError();
  });

  btn.addEventListener('click', () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
      return showError('Username and password are required');
    }

    clearError();

    if (isLoginMode) {
      // Login
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const user = users.find(u => u.username === username && u.password === password);

      if (user) {
        localStorage.setItem('username', username);
        window.location.href = 'index.html';
      } else {
        showError('Incorrect username or password');
      }
    } else {
      // Register
      let users = JSON.parse(localStorage.getItem('users') || '[]');

      if (users.some(u => u.username === username)) {
        return showError('Username already taken');
      }

      users.push({ username, password });
      localStorage.setItem('users', JSON.stringify(users));
      localStorage.setItem('username', username);
      localStorage.setItem('wishlist', JSON.stringify([]));
      localStorage.setItem('purchased', JSON.stringify([]));

      window.location.href = 'index.html';
    }
    });
  </script>
  
  <script src="js/theme-toggle.js"></script>
  <script src="js/user.js"></script>
  
  <script>
    // Show/Hide password eye icon
  const eyeIcon = document.getElementById('eye-icon');
  const passwordInput = document.getElementById('password');

  if (eyeIcon && passwordInput) {
    eyeIcon.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.textContent = '🙈'; // hide icon
      } else {
        passwordInput.type = 'password';
        eyeIcon.textContent = '👁️'; // show icon
      }
    });
  }
</script>
</body>
</html>
